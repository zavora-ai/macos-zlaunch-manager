name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-cli:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build CLI (Universal Binary)
        run: |
          cd cli
          swift build -c release --arch arm64 --arch x86_64
          file .build/apple/Products/Release/lm

      - name: Package binary
        run: |
          mkdir -p dist
          cp cli/.build/apple/Products/Release/lm dist/lm
          cd dist
          tar -czf lm-${{ github.ref_name }}-macos-universal.tar.gz lm
          shasum -a 256 lm-${{ github.ref_name }}-macos-universal.tar.gz > checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lm-binary
          path: dist/

  build-app:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build GUI App (Universal Binary)
        run: |
          xcodebuild -project LaunchManager/LaunchManager.xcodeproj \
            -scheme LaunchManager \
            -configuration Release \
            -arch arm64 -arch x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR=$PWD/build/release \
            build

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/release/LaunchManager.app build/dmg/
          ln -sf /Applications build/dmg/Applications
          hdiutil create -volname "Launch Manager" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            build/LaunchManager-${{ github.ref_name }}.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: build/LaunchManager-*.dmg

  release:
    needs: [build-cli, build-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lm-binary/lm-*-macos-universal.tar.gz
            lm-binary/checksums.txt
            dmg/LaunchManager-*.dmg
          body: |
            ## Install

            ### CLI (one-liner)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/zavora/macos-launch-manager/main/scripts/install.sh | bash
            ```

            ### CLI (Homebrew)
            ```bash
            brew install zavora/tap/lm
            ```

            ### CLI (manual binary)
            ```bash
            curl -L https://github.com/zavora/macos-launch-manager/releases/download/${{ github.ref_name }}/lm-${{ github.ref_name }}-macos-universal.tar.gz | tar xz
            sudo mv lm /usr/local/bin/
            ```

            ### GUI App
            Download `LaunchManager-${{ github.ref_name }}.dmg`, open it, drag to Applications.
