name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-cli:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build CLI (Universal Binary)
        run: |
          cd cli
          swift build -c release --arch arm64 --arch x86_64
          file .build/apple/Products/Release/zlm

      - name: Package binary
        run: |
          mkdir -p dist
          cp cli/.build/apple/Products/Release/zlm dist/zlm
          cd dist
          tar -czf zlm-${{ github.ref_name }}-macos-universal.tar.gz zlm
          shasum -a 256 zlm-${{ github.ref_name }}-macos-universal.tar.gz > checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zlm-binary
          path: dist/

  build-app:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build GUI App (Universal Binary)
        run: |
          xcodebuild -project ZLaunchManager/ZLaunchManager.xcodeproj \
            -scheme ZLaunchManager \
            -configuration Release \
            -arch arm64 -arch x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR=$PWD/build/release \
            build

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/release/ZLaunchManager.app build/dmg/
          ln -sf /Applications build/dmg/Applications
          hdiutil create -volname "ZLaunch Manager" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            build/ZLaunchManager-${{ github.ref_name }}.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: build/ZLaunchManager-*.dmg

  release:
    needs: [build-cli, build-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zlm-binary/zlm-*-macos-universal.tar.gz
            zlm-binary/checksums.txt
            dmg/ZLaunchManager-*.dmg
          body: |
            ## Install

            ### CLI (one-liner)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/zavora-ai/macos-zlaunch-manager/main/scripts/install.sh | bash
            ```

            ### CLI (Homebrew)
            ```bash
            brew install zavora-ai/tap/zlm
            ```

            ### CLI (manual binary)
            ```bash
            curl -L https://github.com/zavora-ai/macos-zlaunch-manager/releases/download/${{ github.ref_name }}/zlm-${{ github.ref_name }}-macos-universal.tar.gz | tar xz
            sudo mv zlm /usr/local/bin/
            ```

            ### GUI App
            Download `ZLaunchManager-${{ github.ref_name }}.dmg`, open it, drag to Applications.
